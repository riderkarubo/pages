<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FY26 Q2 OffSite Timer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱️</text></svg>">
  <meta name="description" content="Firework Japan FY26 Q2 OffSite のタイムキープアプリ">
  <meta property="og:title" content="FY26 Q2 OffSite Timer">
  <meta property="og:description" content="Firework Japan FY26 Q2 OffSite のタイムキープアプリ">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://riderkarubo.github.io/pages/q2-offsite-timer/">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="FY26 Q2 OffSite Timer">
  <meta name="twitter:description" content="Firework Japan FY26 Q2 OffSite のタイムキープアプリ">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .session-card {
      transition: all 0.2s ease;
    }
    .session-card:hover {
      transform: translateX(4px);
    }
    .current-session {
      animation: pulse-border 2s infinite;
    }
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.5); }
      50% { box-shadow: 0 0 0 8px rgba(59, 130, 246, 0); }
    }
    .delay-btn {
      min-width: 36px;
      height: 36px;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app" class="max-w-2xl mx-auto p-4 pb-24">
    <!-- Header -->
    <header class="bg-white rounded-xl shadow-lg p-4 mb-4 sticky top-2 z-10">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-3">
          <h1 class="text-xl font-bold text-gray-800">OffSite Timer</h1>
          <button onclick="resetAllDelays()" class="text-xs px-3 py-1 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg transition-colors">
            リセット
          </button>
        </div>
        <div class="text-right">
          <div id="current-time" class="text-2xl font-mono font-bold text-blue-600"></div>
          <div id="total-delay" class="text-lg font-bold text-red-500"></div>
        </div>
      </div>
      <div id="current-session-info" class="mt-3 p-3 bg-blue-50 rounded-lg hidden">
        <div class="text-sm text-blue-600 font-medium">現在進行中</div>
        <div id="current-session-title" class="text-lg font-bold text-blue-800"></div>
        <div id="current-session-time" class="text-sm text-blue-600"></div>
      </div>
    </header>

    <!-- Schedule List -->
    <div id="schedule-list" class="space-y-2">
      <!-- Generated by JavaScript -->
    </div>
  </div>

  <script>
    // ========================================
    // 初期スケジュールデータ（全セッション）
    // ========================================
    const initialSchedule = [
      // 1. Opening & 戦略方針
      { id: 1, time: "11:00", duration: 10, title: "Opening", detail: "開会", delay: 0 },
      { id: 2, time: "11:10", duration: 15, title: "Q1振り返り & Q2戦略方針", detail: "Kazuki / Nobu — ARR / New / Expansion / Contraction の現状と戦略確認", delay: 0 },

      // 2. Lunch
      { id: 3, time: "11:25", duration: 60, title: "Lunch Break", detail: "ランチ休憩", delay: 0 },

      // 3. Pre-Mortem 前半：攻め
      { id: 4, time: "12:25", duration: 60, title: "Pre-Mortem 前半：攻め", detail: "Toshi — New / Expansion（プロダクト軸・提案のHow軸・エンゲージメント軸）", delay: 0 },

      // 4. Break
      { id: 5, time: "13:25", duration: 15, title: "Short Break", detail: "休憩", delay: 0 },

      // 5. Pre-Mortem 後半：守り
      { id: 6, time: "13:40", duration: 60, title: "Pre-Mortem 後半：守り", detail: "Toshi — Churn / Contraction（理想と現実のギャップを埋めるアクション策定）", delay: 0 },

      // 6. Break
      { id: 7, time: "14:40", duration: 10, title: "Short Break", detail: "休憩", delay: 0 },

      // 7. 目安箱ディスカッション
      { id: 8, time: "14:50", duration: 60, title: "目安箱ディスカッション", detail: "Kazuki / Issy — 集まった意見・改善提案をもとに議論", delay: 0 },

      // 8. Break
      { id: 9, time: "15:50", duration: 10, title: "Short Break", detail: "休憩", delay: 0 },

      // 9. Claude Coworkとは？
      { id: 10, time: "16:00", duration: 5, title: "Nobu: Claude Coworkとは？/ 主要機能", detail: "🎯 Claude Coworkの概要と主要機能の紹介", delay: 0 },

      // 10. Issyのベストプラクティス
      { id: 11, time: "16:05", duration: 10, title: "Issyのベストプラクティス — 自分用ツール開発編", detail: "💡 自分用ツール開発の活用事例を共有", delay: 0 },

      // 11. Kazukiのベストプラクティス
      { id: 12, time: "16:15", duration: 10, title: "Kazukiのベストプラクティス — シーン・目的編", detail: "💡 シーン・目的別の活用事例を共有", delay: 0 },

      // 12. アンケート結果共有 & テーマ設定
      { id: 13, time: "16:25", duration: 10, title: "アンケート結果共有 & テーマ設定", detail: "📊 事前アンケートの結果を共有し、ハンズオンのテーマを設定", delay: 0 },

      // 13. ハンズオンワーク
      { id: 14, time: "16:35", duration: 70, title: "ハンズオンワーク — チーム別", detail: "⚡ チームに分かれて実践ワーク", delay: 0 },

      // 14. チーム成果発表 & フィードバック
      { id: 15, time: "17:45", duration: 30, title: "チーム成果発表 & フィードバック", detail: "🎤 各チームの成果を発表し、フィードバック", delay: 0 },

      // 15. まとめ & ネクストアクション
      { id: 16, time: "18:15", duration: 5, title: "まとめ & ネクストアクション", detail: "🚀 今日の振り返りと次のアクション", delay: 0 },

      // 16. Closing
      { id: 17, time: "18:20", duration: 10, title: "Closing", detail: "クロージング", delay: 0 },

      // 17. オフィス出発
      { id: 18, time: "18:45", duration: 0, title: "オフィス出発 → 懇親会へ", detail: "🚶 移動開始", delay: 0 },

      // 18. 懇親会
      { id: 19, time: "19:00", duration: 0, title: "懇親会", detail: "お疲れ様でした！", delay: 0 },
    ];

    // アプリケーション状態
    let schedule = JSON.parse(JSON.stringify(initialSchedule));

    // LocalStorageから復元
    const savedData = localStorage.getItem('offsite-schedule');
    if (savedData) {
      try {
        const parsed = JSON.parse(savedData);
        // delayのみ復元
        schedule = schedule.map(item => {
          const saved = parsed.find(s => s.id === item.id);
          return saved ? { ...item, delay: saved.delay } : item;
        });
      } catch (e) {
        console.error('Failed to load saved data', e);
      }
    }

    // ========================================
    // ヘルパー関数
    // ========================================

    // 時間文字列を分に変換 ("12:30" -> 750)
    function timeToMinutes(timeStr) {
      const [hours, minutes] = timeStr.split(':').map(Number);
      return hours * 60 + minutes;
    }

    // 分を時間文字列に変換 (750 -> "12:30")
    function minutesToTime(totalMinutes) {
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
    }

    // 現在時刻を取得（分単位）
    function getCurrentMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    // ========================================
    // コア計算ロジック
    // ========================================
    function calculateSchedule() {
      const baseMinutes = timeToMinutes(schedule[0].time);
      let currentMinutes = baseMinutes;

      return schedule.map((item, index) => {
        const originalStart = timeToMinutes(item.time);
        const actualStart = currentMinutes;
        const actualEnd = actualStart + item.duration + item.delay;

        // 次のアイテムの開始時間を更新
        currentMinutes = actualEnd;

        // 遅延計算（予定開始時刻との差分）
        const startDiff = actualStart - originalStart;

        return {
          ...item,
          originalTime: item.time,
          actualStartTime: minutesToTime(actualStart),
          actualEndTime: minutesToTime(actualEnd),
          startDiff: startDiff,
          isDelayed: item.delay > 0 || startDiff > 0
        };
      });
    }

    // 合計ディレイ計算
    function getTotalDelay() {
      return schedule.reduce((sum, item) => sum + item.delay, 0);
    }

    // 現在進行中のセッションを取得
    function getCurrentSession(calculated) {
      const currentMinutes = getCurrentMinutes();

      for (const session of calculated) {
        const start = timeToMinutes(session.actualStartTime);
        const end = timeToMinutes(session.actualEndTime);

        if (currentMinutes >= start && currentMinutes < end) {
          return session;
        }
      }
      return null;
    }

    // ========================================
    // UI更新関数
    // ========================================
    function updateDelay(id, change) {
      schedule = schedule.map(item => {
        if (item.id === id) {
          const newDelay = Math.max(0, item.delay + change);
          return { ...item, delay: newDelay };
        }
        return item;
      });

      // LocalStorageに保存
      localStorage.setItem('offsite-schedule', JSON.stringify(schedule.map(s => ({ id: s.id, delay: s.delay }))));

      render();
    }

    function render() {
      const calculated = calculateSchedule();
      const totalDelay = getTotalDelay();
      const currentSession = getCurrentSession(calculated);
      const currentMinutes = getCurrentMinutes();

      // 合計ディレイ表示
      const delayEl = document.getElementById('total-delay');
      if (totalDelay > 0) {
        delayEl.textContent = `🔺 ${totalDelay}分遅延`;
        delayEl.classList.remove('hidden');
      } else {
        delayEl.textContent = '✅ 予定通り';
        delayEl.classList.remove('text-red-500');
        delayEl.classList.add('text-green-500');
      }

      // 現在進行中セッション
      const currentInfo = document.getElementById('current-session-info');
      const currentTitle = document.getElementById('current-session-title');
      const currentTime = document.getElementById('current-session-time');

      if (currentSession) {
        currentInfo.classList.remove('hidden');
        currentTitle.textContent = currentSession.title;
        currentTime.textContent = `${currentSession.actualStartTime} - ${currentSession.actualEndTime}`;
      } else {
        currentInfo.classList.add('hidden');
      }

      // スケジュールリスト
      const listEl = document.getElementById('schedule-list');
      listEl.innerHTML = calculated.map((item, index) => {
        const isCurrent = currentSession && currentSession.id === item.id;
        const isPast = timeToMinutes(item.actualEndTime) < currentMinutes;
        const hasDelay = item.delay > 0;
        const isStartDelayed = item.startDiff > 0;

        let borderColor = 'border-blue-500';
        let bgColor = 'bg-white';

        if (isPast) {
          borderColor = 'border-gray-300';
          bgColor = 'bg-gray-50';
        } else if (isCurrent) {
          borderColor = 'border-blue-500';
          bgColor = 'bg-blue-50';
        } else if (hasDelay) {
          borderColor = 'border-red-500';
        } else if (isStartDelayed) {
          borderColor = 'border-orange-400';
        }

        return `
          <div class="session-card border-l-4 ${borderColor} ${bgColor} rounded-r-lg p-4 shadow ${isCurrent ? 'current-session' : ''} ${isPast ? 'opacity-60' : ''}">
            <div class="flex justify-between items-start gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-2 mb-1">
                  <span class="text-lg font-bold ${isStartDelayed && !isPast ? 'text-red-600' : 'text-gray-800'}">
                    ${item.actualStartTime}
                  </span>
                  <span class="text-gray-400">→</span>
                  <span class="text-lg font-bold text-gray-600">
                    ${item.actualEndTime}
                  </span>
                  ${isStartDelayed && !isPast ? `<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">+${item.startDiff}分</span>` : ''}
                </div>
                <div class="text-gray-500 text-sm line-through ${isStartDelayed ? '' : 'hidden'}">
                  予定: ${item.originalTime}
                </div>
                <div class="font-semibold text-gray-800 mt-1">${item.title}</div>
                <div class="text-sm text-gray-500">${item.detail}</div>
                <div class="text-xs text-gray-400 mt-1">所要時間: ${item.duration}分</div>
              </div>

              <div class="flex flex-col items-center gap-1">
                <div class="text-xs text-gray-500 mb-1">ディレイ</div>
                <div class="flex items-center gap-1">
                  <button
                    onclick="updateDelay(${item.id}, -1)"
                    class="delay-btn flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-lg font-bold text-gray-600 transition-colors"
                    ${item.delay === 0 ? 'disabled' : ''}
                  >-1</button>
                  <span class="w-10 text-center font-bold text-lg ${hasDelay ? 'text-red-600' : 'text-gray-400'}">
                    ${item.delay}
                  </span>
                  <button
                    onclick="updateDelay(${item.id}, 1)"
                    class="delay-btn flex items-center justify-center bg-gray-200 hover:bg-gray-300 rounded-lg font-bold text-gray-600 transition-colors"
                  >+1</button>
                </div>
                <div class="flex gap-1 mt-1">
                  <button
                    onclick="updateDelay(${item.id}, -5)"
                    class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-500 transition-colors"
                    ${item.delay < 5 ? 'disabled' : ''}
                  >-5</button>
                  <button
                    onclick="updateDelay(${item.id}, 5)"
                    class="px-2 py-1 text-xs bg-gray-100 hover:bg-gray-200 rounded text-gray-500 transition-colors"
                  >+5</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 現在時刻更新
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('ja-JP', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('current-time').textContent = timeStr;
    }

    // リセット機能
    function resetAllDelays() {
      if (confirm('全てのディレイをリセットしますか？')) {
        schedule = JSON.parse(JSON.stringify(initialSchedule));
        localStorage.removeItem('offsite-schedule');
        render();
      }
    }

    // 初期化
    document.addEventListener('DOMContentLoaded', () => {
      render();
      updateClock();

      // 1秒ごとに時計更新
      setInterval(updateClock, 1000);

      // 30秒ごとにセッション状態更新
      setInterval(render, 30000);
    });
  </script>
</body>
</html>
